# ============================================================
# Nginx config: checkin + ShanHaiJing on same domain
# Domain: checkin.morefun.wang
# ============================================================

# Gzip compression for static assets
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xml+rss
    image/svg+xml
    font/ttf
    font/otf
    font/woff
    font/woff2;

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name checkin.morefun.wang;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name checkin.morefun.wang;

    ssl_certificate     /etc/letsencrypt/live/checkin.morefun.wang/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/checkin.morefun.wang/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # === Existing: checkin API ===
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # === Existing: checkin admin panel ===
    location /admin {
        proxy_pass http://127.0.0.1:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # === Existing: verification file ===
    location = /f3190904e09b287124b3bec53b5d8af2.txt {
        default_type text/plain;
        return 200 '5be5189b7bc0bfcdc3ba9ce2f8d19c6ddadd1e44';
    }

    # ============================================================
    # ShanHaiJing (/shj/)
    # ============================================================

    # ShanHaiJing API → Flask container
    location /shj/api/ {
        rewrite ^/shj(/api/.*)$ $1 break;
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for AI generation endpoints
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;

        # Streaming and upload support
        proxy_buffering off;
        client_max_body_size 50M;
    }

    # ShanHaiJing frontend static files (Vue SPA)
    location /shj/ {
        alias /opt/ShanHaiJing/frontend/dist/;
        try_files $uri /shj/index.html;
    }

    # Redirect /shj (no trailing slash) to /shj/
    location = /shj {
        return 301 /shj/;
    }
}

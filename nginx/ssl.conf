# SSL Configuration for Let's Encrypt certificates
# This file is included by nginx/default.conf for initial SSL setup.
#
# When Let's Encrypt certificates exist, this file is replaced by certbot.
# The paths below match certbot's default output structure.

# During initial deployment, generate self-signed placeholders so nginx can start:
#   mkdir -p /etc/nginx/ssl
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout /etc/nginx/ssl/privkey.pem \
#     -out /etc/nginx/ssl/fullchain.pem \
#     -subj "/CN=localhost"
#
# After running certbot, the actual Let's Encrypt certs replace these placeholders:
#   certbot certonly --webroot -w /var/www/certbot -d your-domain.com
#   certbot install --cert-name your-domain.com

# DH parameters (generate once, reuse across renewals)
# openssl dhparam -out /etc/nginx/ssl/dhparam.pem 2048
# ssl_dhparam /etc/nginx/ssl/dhparam.pem;

# OCSP Stapling (uncomment after valid cert is in place)
# ssl_stapling on;
# ssl_stapling_verify on;
# ssl_trusted_certificate /etc/nginx/ssl/chain.pem;
# resolver 8.8.8.8 8.8.4.4 valid=300s;
# resolver_timeout 5s;
